name: priority

on:
  push:

jobs:
  specify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        reality: ["hardship", "foolish", "enormous", "fox", "flee"]
        authority: ["fever", "effective", "framework", "merry"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar fx.jar
